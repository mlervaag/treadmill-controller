services:
  treadmill-controller:
    build: .
    container_name: treadmill-controller
    ports:
      - "3000:3000"   # HTTP (view.html, no cert warnings)
      - "3001:3001"   # HTTPS (index.html, Web Bluetooth)
    # Load Strava credentials and other env vars from .env file
    # Create .env from .env.example: cp .env.example .env
    env_file:
      - path: .env
        required: false
    volumes:
      # Persist database outside container
      - ./data:/app/data
      # SSL certificates for HTTPS (optional)
      - ./certs:/app/certs:ro
      # TTS audio cache
      - ./tts-cache:/app/tts-cache
      # PulseAudio socket for A2DP speaker playback
      - /run/user/1000/pulse:/run/user/1000/pulse
    environment:
      - NODE_ENV=production
      - DATABASE_PATH=/app/data/treadmill.db
      - PULSE_SERVER=unix:/run/user/1000/pulse/native
    # Change to "no" if you want manual control (save power)
    # Use "unless-stopped" for 24/7 operation
    restart: unless-stopped
    networks:
      - treadmill-network
    # Resource limits for Raspberry Pi
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 128M

networks:
  treadmill-network:
    driver: bridge

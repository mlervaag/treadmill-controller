<!DOCTYPE html>
<html lang="no">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#000000">
    <title>Tredemølle Visning</title>
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { overflow-x: hidden; max-width: 100%; }

        :root {
            --primary-color: #007AFF;
            --success-color: #34C759;
            --warning-color: #FF9500;
            --danger-color: #FF3B30;
            --bg: #000000;
            --card-bg: #1C1C1E;
            --card-bg-light: #2C2C2E;
            --text-primary: #FFFFFF;
            --text-secondary: #ABABAF;
            --border-color: #38383A;
            --zone1: #8E8E93;
            --zone2: #007AFF;
            --zone3: #34C759;
            --zone4: #FF9500;
            --zone5: #FF3B30;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Segoe UI', Roboto, sans-serif;
            background: var(--bg);
            color: var(--text-primary);
            min-height: 100dvh;
            overflow-x: hidden;
        }

        .view-container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 12px;
            min-height: 100dvh;
            display: flex;
            flex-direction: column;
        }

        /* Header */
        .view-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 8px 4px;
            margin-bottom: 12px;
        }

        .view-header h1 {
            font-size: 18px;
            font-weight: 600;
            color: var(--text-secondary);
            letter-spacing: 0.5px;
            text-transform: uppercase;
        }

        .connection-dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: var(--danger-color);
            transition: background 0.3s;
        }
        .connection-dot.connected { background: var(--success-color); }
        .connection-dot.connecting { background: var(--warning-color); animation: pulse 1.5s infinite; }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.4; }
        }

        /* Waiting state */
        .waiting-state {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            gap: 16px;
        }

        .waiting-icon {
            font-size: 64px;
            opacity: 0.5;
            animation: pulse 2s infinite;
        }

        .waiting-state h2 {
            font-size: 28px;
            font-weight: 600;
            color: var(--text-secondary);
        }

        .waiting-state p {
            font-size: 16px;
            color: var(--text-secondary);
            opacity: 0.6;
        }

        .hidden { display: none !important; }

        /* Dashboard grid */
        .dashboard {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .primary-row, .secondary-row {
            display: grid;
            gap: 10px;
            overflow: hidden;
        }

        .primary-row {
            grid-template-columns: repeat(3, minmax(0, 1fr));
        }

        .secondary-row {
            grid-template-columns: repeat(3, minmax(0, 1fr));
        }

        /* Stat cards */
        .dash-card {
            background: var(--card-bg);
            border-radius: 16px;
            padding: 16px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            min-height: 140px;
            border: 1px solid var(--border-color);
            overflow: hidden;
        }

        .dash-label {
            font-size: 12px;
            font-weight: 700;
            letter-spacing: 1.5px;
            text-transform: uppercase;
            color: var(--text-secondary);
            margin-bottom: 4px;
        }

        .dash-value {
            font-size: clamp(48px, 10vw, 96px);
            font-weight: 700;
            line-height: 1.1;
            font-variant-numeric: tabular-nums;
        }

        .dash-unit {
            font-size: 14px;
            color: var(--text-secondary);
            margin-top: 2px;
        }

        .dash-card-sm {
            background: var(--card-bg);
            border-radius: 12px;
            padding: 12px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            min-height: 90px;
            border: 1px solid var(--border-color);
            overflow: hidden;
        }

        .dash-value-sm {
            font-size: clamp(28px, 6vw, 48px);
            font-weight: 700;
            line-height: 1.1;
            font-variant-numeric: tabular-nums;
        }

        /* HR zone badge */
        .hr-zone {
            font-size: 13px;
            font-weight: 600;
            margin-top: 4px;
            padding: 2px 10px;
            border-radius: 8px;
            background: rgba(255,255,255,0.08);
        }

        .dash-hr { transition: border-color 0.5s; }

        /* Target vs actual indicator on speed/incline cards */
        .target-indicator {
            font-size: 12px;
            color: var(--text-secondary);
            margin-top: 4px;
            opacity: 0.7;
        }

        /* Workout section */
        .workout-section {
            background: var(--card-bg);
            border-radius: 16px;
            padding: 16px;
            border: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .workout-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .workout-header h2 {
            font-size: 18px;
            font-weight: 600;
        }

        .segment-badge {
            background: var(--primary-color);
            color: white;
            padding: 3px 10px;
            border-radius: 10px;
            font-size: 13px;
            font-weight: 600;
        }

        .segment-current {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .segment-info {
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 8px;
        }

        .segment-name {
            font-size: 20px;
            font-weight: 600;
        }

        .segment-targets {
            display: flex;
            gap: 16px;
            font-size: 15px;
            color: var(--text-secondary);
        }

        .segment-targets strong {
            color: var(--text-primary);
        }

        /* Progress bars */
        .progress-section {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .progress-bar-outer {
            flex: 1;
            height: 10px;
            background: var(--card-bg-light);
            border-radius: 5px;
            overflow: hidden;
        }

        .progress-bar-inner {
            height: 100%;
            background: var(--primary-color);
            border-radius: 5px;
            transition: width 0.5s ease;
            width: 0%;
        }

        .overall .progress-bar-inner {
            background: linear-gradient(90deg, var(--primary-color), #667eea);
        }

        .time-remaining {
            font-size: 14px;
            font-weight: 600;
            color: var(--text-secondary);
            white-space: nowrap;
            min-width: 80px;
            text-align: right;
        }

        .overall-progress-section {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .progress-label-row, .progress-time-row {
            display: flex;
            justify-content: space-between;
            font-size: 13px;
            color: var(--text-secondary);
        }

        .progress-time-row {
            font-size: 12px;
            opacity: 0.7;
        }

        /* Next segment */
        .next-segment {
            padding: 8px 12px;
            background: var(--card-bg-light);
            border-radius: 10px;
            font-size: 14px;
            color: var(--text-secondary);
            display: flex;
            align-items: center;
            gap: 8px;
            flex-wrap: wrap;
        }

        .next-label {
            font-weight: 600;
            color: var(--text-primary);
        }

        /* Responsive */
        @media (max-width: 600px) {
            .primary-row {
                grid-template-columns: 1fr 1fr;
            }
            .primary-row .dash-hr {
                grid-column: span 2;
            }
            .dash-card { min-height: 110px; }
            .dash-value { font-size: clamp(36px, 10vw, 64px); }
        }

        @media (min-width: 601px) and (max-width: 850px) {
            .primary-row, .secondary-row { gap: 8px; }
            .dash-card { padding: 12px; }
            .dash-value { font-size: clamp(40px, 8vw, 72px); }
            .dash-value-sm { font-size: clamp(24px, 5vw, 40px); }
        }

        @media (min-width: 1024px) {
            .view-container { padding: 20px; }
            .dash-card { min-height: 180px; }
            .dash-card-sm { min-height: 120px; }
        }

        /* Landscape mode on tablets */
        @media (orientation: landscape) and (max-height: 600px) {
            .primary-row, .secondary-row {
                grid-template-columns: repeat(6, 1fr);
            }
            .dash-card, .dash-card-sm { min-height: 80px; padding: 8px; }
            .dash-value { font-size: clamp(36px, 8vh, 64px); }
            .dash-value-sm { font-size: clamp(24px, 5vh, 36px); }
        }

        @media (prefers-reduced-motion: reduce) {
            *, *::before, *::after {
                animation-duration: 0.01ms !important;
                transition-duration: 0.01ms !important;
            }
        }
    </style>
</head>
<body>
    <div class="view-container">
        <header class="view-header">
            <h1>Tredemølle Visning</h1>
            <div style="display: flex; align-items: center; gap: 8px;">
                <div class="connection-dot" id="connectionDot"></div>
                <span id="connectionLabel" style="font-size: 0.75rem; color: var(--text-secondary);"></span>
            </div>
        </header>

        <!-- Waiting state -->
        <div id="waitingState" class="waiting-state">
            <div class="waiting-icon">🏃</div>
            <h2>Venter på økt...</h2>
            <p id="waitingMessage">Start en treningsøkt fra kontrollpanelet</p>
        </div>

        <!-- Active dashboard -->
        <div id="activeDashboard" class="dashboard hidden">
            <div class="primary-row">
                <div class="dash-card">
                    <div class="dash-label">Hastighet</div>
                    <div class="dash-value" id="vSpeed">--</div>
                    <div class="dash-unit">km/t</div>
                    <div class="target-indicator hidden" id="vSpeedTarget"></div>
                </div>
                <div class="dash-card">
                    <div class="dash-label">Stigning</div>
                    <div class="dash-value" id="vIncline">--</div>
                    <div class="dash-unit">%</div>
                    <div class="target-indicator hidden" id="vInclineTarget"></div>
                </div>
                <div class="dash-card dash-hr" id="hrCard">
                    <div class="dash-label">Puls</div>
                    <div class="dash-value" id="vHR">--</div>
                    <div class="dash-unit">bpm</div>
                    <div class="hr-zone" id="vHRZone"></div>
                </div>
            </div>

            <div class="secondary-row">
                <div class="dash-card-sm">
                    <div class="dash-label">Distanse</div>
                    <div class="dash-value-sm" id="vDistance">0.00</div>
                    <div class="dash-unit">km</div>
                </div>
                <div class="dash-card-sm">
                    <div class="dash-label">Tid</div>
                    <div class="dash-value-sm" id="vTime">00:00</div>
                </div>
                <div class="dash-card-sm">
                    <div class="dash-label">Kalorier</div>
                    <div class="dash-value-sm" id="vCalories">0</div>
                    <div class="dash-unit">kcal</div>
                </div>
            </div>

            <!-- Workout section -->
            <div id="workoutSection" class="workout-section hidden">
                <div class="workout-header">
                    <h2 id="vWorkoutName"></h2>
                    <span class="segment-badge" id="vSegmentBadge"></span>
                </div>

                <div class="segment-current">
                    <div class="segment-info">
                        <span class="segment-name" id="vSegmentName"></span>
                        <div class="segment-targets">
                            <span>Mål: <strong id="vTargetSpeed">0</strong> km/t</span>
                            <span>Stigning: <strong id="vTargetIncline">0</strong>%</span>
                        </div>
                    </div>
                    <div class="progress-section">
                        <div class="progress-bar-outer">
                            <div class="progress-bar-inner" id="vSegmentProgress"></div>
                        </div>
                        <span class="time-remaining" id="vSegmentTimeLeft">--:--</span>
                    </div>
                </div>

                <div class="overall-progress-section">
                    <div class="progress-label-row">
                        <span>Total fremgang</span>
                        <span id="vOverallPercent">0%</span>
                    </div>
                    <div class="progress-section">
                        <div class="progress-bar-outer overall">
                            <div class="progress-bar-inner" id="vOverallProgress"></div>
                        </div>
                        <span class="time-remaining" id="vWorkoutRemaining">--:--</span>
                    </div>
                </div>

                <div id="nextSegmentSection" class="next-segment hidden">
                    <span class="next-label">Neste:</span>
                    <span id="vNextInfo"></span>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Configuration
        const params = new URLSearchParams(window.location.search);
        const MAX_HR = parseInt(params.get('maxHR')) || 190;

        // State
        let ws = null;
        let reconnectAttempts = 0;
        const MAX_RECONNECT_DELAY = 30000;
        let lastStateTimestamp = 0;
        let staleCheckTimer = null;

        function getHRZone(hr) {
            if (!hr || hr <= 0) return null;
            const pct = (hr / MAX_HR) * 100;
            if (pct < 60) return { zone: 1, name: 'Sone 1', color: 'var(--zone1)' };
            if (pct < 70) return { zone: 2, name: 'Sone 2', color: 'var(--zone2)' };
            if (pct < 80) return { zone: 3, name: 'Sone 3', color: 'var(--zone3)' };
            if (pct < 90) return { zone: 4, name: 'Sone 4', color: 'var(--zone4)' };
            return { zone: 5, name: 'Sone 5', color: 'var(--zone5)' };
        }

        function formatTime(totalSec) {
            if (!totalSec || totalSec < 0) return '00:00';
            const m = Math.floor(totalSec / 60);
            const s = Math.floor(totalSec % 60);
            return `${String(m).padStart(2, '0')}:${String(s).padStart(2, '0')}`;
        }

        function connect() {
            const protocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
            const wsUrl = `${protocol}//${window.location.host}`;

            setConnectionStatus('connecting');

            try {
                ws = new WebSocket(wsUrl);
            } catch (e) {
                console.error('WebSocket creation failed:', e);
                scheduleReconnect();
                return;
            }

            ws.onopen = () => {
                console.log('Connected to server');
                reconnectAttempts = 0;
                setConnectionStatus('connected');
                startStaleCheck();
            };

            ws.onmessage = (event) => {
                try {
                    const data = JSON.parse(event.data);
                    if (data.type === 'treadmill_state') {
                        lastStateTimestamp = Date.now();
                        renderState(data);
                    }
                } catch (e) {
                    console.error('Failed to parse message:', e);
                }
            };

            ws.onclose = () => {
                setConnectionStatus('disconnected');
                stopStaleCheck();
                scheduleReconnect();
            };

            ws.onerror = () => {
                if (ws) ws.close();
            };
        }

        function scheduleReconnect() {
            reconnectAttempts++;
            const delay = Math.min(1000 * Math.pow(2, reconnectAttempts - 1), MAX_RECONNECT_DELAY);
            console.log(`Reconnecting in ${delay}ms (attempt ${reconnectAttempts})`);
            setTimeout(connect, delay);
        }

        function setConnectionStatus(status) {
            const dot = document.getElementById('connectionDot');
            dot.className = 'connection-dot ' + status;
            const label = document.getElementById('connectionLabel');
            const msg = document.getElementById('waitingMessage');
            if (status === 'connected') {
                label.textContent = 'Tilkoblet';
                if (msg) msg.textContent = 'Start en treningsøkt fra kontrollpanelet';
            } else if (status === 'connecting') {
                const attempt = reconnectAttempts > 0 ? ` (forsøk ${reconnectAttempts})` : '';
                label.textContent = 'Kobler til...' + attempt;
                if (msg) {
                    if (reconnectAttempts >= 3) {
                        msg.innerHTML = 'Kan ikke koble til serveren.<br><br>' +
                            '<small style="opacity:0.7">Tips: Åpne <a href="' + window.location.origin + '" style="color: var(--primary-color);">' +
                            window.location.origin + '</a> direkte i nettleseren først og godta SSL-sertifikatet.</small>';
                    } else {
                        msg.textContent = 'Kobler til serveren...';
                    }
                }
            } else {
                label.textContent = 'Frakoblet';
                if (msg) {
                    msg.innerHTML = 'Mistet forbindelsen til serveren.<br>' +
                        '<small style="opacity:0.7">Prøver igjen automatisk...</small>';
                }
            }
        }

        function startStaleCheck() {
            stopStaleCheck();
            staleCheckTimer = setInterval(() => {
                if (Date.now() - lastStateTimestamp > 10000) {
                    showWaiting();
                }
            }, 5000);
        }

        function stopStaleCheck() {
            if (staleCheckTimer) {
                clearInterval(staleCheckTimer);
                staleCheckTimer = null;
            }
        }

        function showWaiting() {
            document.getElementById('waitingState').classList.remove('hidden');
            document.getElementById('activeDashboard').classList.add('hidden');
        }

        function showDashboard() {
            document.getElementById('waitingState').classList.add('hidden');
            document.getElementById('activeDashboard').classList.remove('hidden');
        }

        function renderState(data) {
            if (!data.sessionActive) {
                showWaiting();
                return;
            }
            showDashboard();

            // Speed
            const speedEl = document.getElementById('vSpeed');
            speedEl.textContent = data.speed !== null && data.speed !== undefined
                ? data.speed.toFixed(1) : '--';

            // Speed target indicator
            const speedTarget = document.getElementById('vSpeedTarget');
            if (data.targetSpeed !== null && data.targetSpeed !== undefined) {
                speedTarget.textContent = `Mål: ${data.targetSpeed.toFixed(1)}`;
                speedTarget.classList.remove('hidden');
            } else {
                speedTarget.classList.add('hidden');
            }

            // Incline
            const inclineEl = document.getElementById('vIncline');
            inclineEl.textContent = data.incline !== null && data.incline !== undefined
                ? data.incline.toFixed(1) : '--';

            // Incline target indicator
            const inclineTarget = document.getElementById('vInclineTarget');
            if (data.targetIncline !== null && data.targetIncline !== undefined) {
                inclineTarget.textContent = `Mål: ${data.targetIncline.toFixed(1)}`;
                inclineTarget.classList.remove('hidden');
            } else {
                inclineTarget.classList.add('hidden');
            }

            // Heart rate
            const hrCard = document.getElementById('hrCard');
            const hrEl = document.getElementById('vHR');
            const hrZoneEl = document.getElementById('vHRZone');

            if (data.heartRate && data.heartRate > 0) {
                hrEl.textContent = data.heartRate;
                hrCard.style.display = '';
                const zone = getHRZone(data.heartRate);
                if (zone) {
                    hrZoneEl.textContent = zone.name;
                    hrZoneEl.style.color = zone.color;
                    hrCard.style.borderColor = zone.color;
                } else {
                    hrZoneEl.textContent = '';
                    hrCard.style.borderColor = '';
                }
            } else {
                hrCard.style.display = 'none';
            }

            // Distance
            document.getElementById('vDistance').textContent =
                (data.distance || 0).toFixed(2);

            // Time
            document.getElementById('vTime').textContent =
                formatTime(data.elapsedTime || 0);

            // Calories
            document.getElementById('vCalories').textContent =
                Math.round(data.calories || 0);

            // Workout section
            const workoutSection = document.getElementById('workoutSection');
            if (data.workout) {
                workoutSection.classList.remove('hidden');
                renderWorkout(data.workout);
            } else {
                workoutSection.classList.add('hidden');
            }
        }

        function renderWorkout(w) {
            document.getElementById('vWorkoutName').textContent = w.name || '';
            document.getElementById('vSegmentBadge').textContent =
                `${(w.currentSegmentIndex || 0) + 1} / ${w.totalSegments || 0}`;

            if (w.currentSegment) {
                document.getElementById('vSegmentName').textContent =
                    w.currentSegment.name || '';
                document.getElementById('vTargetSpeed').textContent =
                    (w.currentSegment.targetSpeed || 0).toFixed(1);
                document.getElementById('vTargetIncline').textContent =
                    (w.currentSegment.targetIncline || 0).toFixed(1);

                // Segment progress
                const segDur = w.currentSegment.durationSeconds || 0;
                const segRemain = w.currentSegment.timeRemaining || 0;
                const segPct = segDur > 0
                    ? ((segDur - segRemain) / segDur) * 100 : 0;
                document.getElementById('vSegmentProgress').style.width =
                    Math.min(100, Math.max(0, segPct)) + '%';
                document.getElementById('vSegmentTimeLeft').textContent =
                    formatTime(segRemain) + ' igjen';
            }

            // Overall progress
            document.getElementById('vOverallProgress').style.width =
                Math.min(100, Math.max(0, w.overallProgress || 0)) + '%';
            document.getElementById('vOverallPercent').textContent =
                Math.round(w.overallProgress || 0) + '%';

            // Remaining time
            const remaining = (w.totalDuration || 0) - (w.elapsedInWorkout || 0);
            document.getElementById('vWorkoutRemaining').textContent =
                formatTime(remaining) + ' igjen';

            // Next segment
            const nextSec = document.getElementById('nextSegmentSection');
            if (w.nextSegment) {
                nextSec.classList.remove('hidden');
                const durMin = Math.round((w.nextSegment.durationSeconds || 0) / 60);
                document.getElementById('vNextInfo').textContent =
                    `${w.nextSegment.name} | ${(w.nextSegment.targetSpeed || 0).toFixed(1)} km/t | ${(w.nextSegment.targetIncline || 0).toFixed(1)}% | ${durMin} min`;
            } else {
                nextSec.classList.add('hidden');
            }
        }

        // Initialize
        document.addEventListener('DOMContentLoaded', connect);
    </script>
</body>
</html>
